<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
    }
    .wrap { padding: 2px 0 6px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 400;
      color: rgb(49, 51, 63);
      margin-bottom: 6px;
    }
    input[type="time"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid rgba(49,51,63,0.2);
      border-radius: 6px;
      font-size: 15px;
      color: rgb(49, 51, 63);
      background: #fff;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="time"]:focus,
    input[type="time"]:hover {
      border-color: #ff4b4b;
      box-shadow: 0 0 0 2px rgba(255,75,75,0.18);
    }
    input[type="time"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.55;
      filter: invert(0);
    }
    input[type="time"]::-webkit-calendar-picker-indicator:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <label id="lbl"></label>
    <input type="time" id="tp" />
  </div>

  <script>
    let initialised = false;

    function send(value) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setComponentValue",
        value: value
      }, "*");
    }

    function setHeight() {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setFrameHeight",
        height: document.body.scrollHeight + 4
      }, "*");
    }

    window.addEventListener("message", function (ev) {
      if (!ev.data || ev.data.type !== "streamlit:render") return;
      const args = ev.data.args || {};
      document.getElementById("lbl").textContent = args.label || "";
      const tp = document.getElementById("tp");
      if (!initialised) {
        // Set value only on first render; never reset what the user has typed
        if (args.value) tp.value = args.value;
        initialised = true;
        send(tp.value);
      }
      setHeight();
    });

    document.getElementById("tp").addEventListener("change", function () {
      send(this.value);
    });

    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:componentReady",
      apiVersion: 1
    }, "*");
  </script>
</body>
</html>
