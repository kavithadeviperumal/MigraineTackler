services:
  - type: web
    name: migrainetackler-api
    runtime: python
    buildCommand: pip install .
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: AIRNOW_API_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: LANGCHAIN_PROJECT
        value: migrainetackler
      - key: LOG_LEVEL
        value: INFO
